<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Din Homework Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F1;
    --paper-line:#C7D8EC;
    --margin-red:#C1443C;
    --ink:#2C3E63;
    --ink-soft:#5B6B8C;
    --gold:#E8A33D;
    --gold-soft:#F6DFB4;
    --done-green:#5AA469;
    --done-green-soft:#DCEFDF;
    --shadow: 0 8px 24px rgba(44,62,99,0.08);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    padding:32px 16px 80px;
    background:
      repeating-linear-gradient(
        var(--paper),
        var(--paper) 33px,
        var(--paper-line) 34px
      );
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }

  .page{
    max-width:720px;
    margin:0 auto;
    position:relative;
    padding-left:28px;
  }

  .margin-line{
    position:absolute;
    left:0;
    top:-16px;
    bottom:-40px;
    width:2px;
    background:var(--margin-red);
    opacity:0.55;
  }

  header{
    text-align:center;
    margin-bottom:28px;
  }

  header h1{
    font-family:'Caveat', cursive;
    font-size:52px;
    font-weight:700;
    color:var(--margin-red);
    margin:0 0 4px;
    transform:rotate(-1deg);
  }

  header p{
    margin:0;
    color:var(--ink-soft);
    font-size:15px;
    font-weight:600;
    letter-spacing:0.3px;
  }

  .overall-card{
    background:#fff;
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:26px;
    display:flex;
    align-items:center;
    gap:20px;
  }

  .ring-wrap{
    position:relative;
    width:78px;
    height:78px;
    flex-shrink:0;
  }

  .ring-wrap svg{ transform:rotate(-90deg); }

  .ring-bg{ fill:none; stroke:#EFEAE0; stroke-width:9; }
  .ring-fg{
    fill:none;
    stroke:var(--gold);
    stroke-width:9;
    stroke-linecap:round;
    transition:stroke-dashoffset 0.5s ease;
  }

  .ring-label{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:17px;
    color:var(--ink);
  }

  .overall-text h2{
    margin:0 0 4px;
    font-size:17px;
    font-weight:800;
  }

  .overall-text p{
    margin:0;
    font-size:13.5px;
    color:var(--ink-soft);
  }

  .day-card{
    background:#fff;
    border-radius:18px;
    box-shadow:var(--shadow);
    margin-bottom:18px;
    overflow:hidden;
    border:1px solid rgba(44,62,99,0.06);
    transition:transform 0.15s ease;
  }

  .day-card.complete{
    border-color:rgba(90,164,105,0.35);
  }

  .day-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    gap:12px;
  }

  .day-head-left{
    display:flex;
    align-items:baseline;
    gap:10px;
  }

  .day-num{
    font-family:'Caveat', cursive;
    font-size:30px;
    font-weight:700;
    color:var(--margin-red);
    line-height:1;
  }

  .day-date{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:700;
    background:#F1F5FB;
    padding:3px 10px;
    border-radius:20px;
  }

  .day-progress-pill{
    font-size:12.5px;
    font-weight:800;
    color:var(--ink-soft);
    background:#F6F3EA;
    padding:4px 12px;
    border-radius:20px;
    white-space:nowrap;
  }

  .day-card.complete .day-progress-pill{
    background:var(--done-green-soft);
    color:var(--done-green);
  }

  .mini-bar{
    height:5px;
    background:#EFEAE0;
    margin:0 20px;
    border-radius:3px;
    overflow:hidden;
  }

  .mini-bar-fill{
    height:100%;
    background:var(--gold);
    border-radius:3px;
    transition:width 0.4s ease;
  }

  .day-card.complete .mini-bar-fill{
    background:var(--done-green);
  }

  .task-list{
    padding:14px 20px 18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .task-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px;
    border-radius:12px;
    background:#FBFAF6;
    transition:background 0.2s ease;
  }

  .task-row.checked{
    background:var(--done-green-soft);
  }

  .task-check{
    width:24px;
    height:24px;
    flex-shrink:0;
    border-radius:8px;
    border:2px solid #D8CFB8;
    background:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.15s ease;
  }

  .task-row.checked .task-check{
    background:var(--done-green);
    border-color:var(--done-green);
  }

  .task-check svg{
    width:14px;
    height:14px;
    opacity:0;
    transition:opacity 0.15s ease;
  }

  .task-row.checked .task-check svg{ opacity:1; }

  .task-body{ flex:1; min-width:0; }

  .task-subject{
    font-size:11.5px;
    font-weight:800;
    letter-spacing:0.4px;
    text-transform:uppercase;
    color:var(--gold);
    display:block;
    margin-bottom:2px;
  }

  .task-row.checked .task-subject{ color:var(--done-green); }

  .task-text{
    font-size:14.5px;
    font-weight:600;
    color:var(--ink);
  }

  .task-row.checked .task-text{
    color:var(--ink-soft);
    text-decoration:line-through;
    text-decoration-color:var(--done-green);
  }

  .complete-btn{
    margin:0 20px 18px;
    padding:11px;
    border:none;
    border-radius:12px;
    background:var(--gold);
    color:#fff;
    font-weight:800;
    font-size:14px;
    font-family:'Nunito',sans-serif;
    cursor:pointer;
    text-align:center;
    transition:all 0.15s ease;
  }

  .complete-btn:hover{ filter:brightness(1.05); }
  .complete-btn:active{ transform:scale(0.98); }

  .day-card.complete .complete-btn{
    background:var(--done-green);
  }

  footer{
    text-align:center;
    margin-top:24px;
    font-size:12.5px;
    color:var(--ink-soft);
  }

  @media (max-width:480px){
    header h1{ font-size:42px; }
    .day-head{ flex-wrap:wrap; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="margin-line"></div>
  <header>
    <h1>Homework Diary</h1>
    <p>14 Julai &mdash; 23 Julai 2026 &nbsp;|&nbsp; 10 Din Ka Plan</p>
  </header>

  <div class="overall-card">
    <div class="ring-wrap">
      <svg width="78" height="78" viewBox="0 0 78 78">
        <circle class="ring-bg" cx="39" cy="39" r="32"></circle>
        <circle class="ring-fg" id="overallRing" cx="39" cy="39" r="32" stroke-dasharray="201" stroke-dashoffset="201"></circle>
      </svg>
      <div class="ring-label" id="overallPercent">0%</div>
    </div>
    <div class="overall-text">
      <h2>Overall Progress</h2>
      <p id="overallSub">0 / 0 tasks complete &mdash; Mumma, tick karte jayein jaise jaise ho jaye.</p>
    </div>
  </div>

  <div id="days"></div>

  <footer>Mumma tick karengi jab bachcha task complete kar le. Progress apne aap save ho jayega.</footer>
</div>

<script>
const PLAN = [
  { day:1, date:"14/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table 1 se 10 tak likhna"}
  ]},
  { day:2, date:"15/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"Forms of Verbs likhna"}
  ]},
  { day:3, date:"16/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"Forms of Verbs revise karke Mumma ko sunana"}
  ]},
  { day:4, date:"17/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"Forms of Verbs revise karke Mumma ko sunana"}
  ]},
  { day:5, date:"18/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"Forms of Verbs revise karke Mumma ko sunana"}
  ]},
  { day:6, date:"19/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"1 page writing"}
  ]},
  { day:7, date:"20/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"1 page writing"}
  ]},
  { day:8, date:"21/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"1 page writing"}
  ]},
  { day:9, date:"22/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"1 page writing"}
  ]},
  { day:10, date:"23/7/2026", tasks:[
    {subject:"Urdu", text:"5 page daily writing"},
    {subject:"Math", text:"Table revise karke Mumma ko sunana"},
    {subject:"English", text:"1 page writing"}
  ]}
];

const STORAGE_KEY = "homework-tracker-state";
let state = {};

async function loadState(){
  try{
    if(window.storage){
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){ state = JSON.parse(res.value); return; }
    }
  }catch(e){ /* key not found or storage unavailable */ }
  try{
    const local = localStorage.getItem(STORAGE_KEY);
    if(local){ state = JSON.parse(local); return; }
  }catch(e){ /* localStorage unavailable */ }
  state = {};
}

async function saveState(){
  const json = JSON.stringify(state);
  try{
    if(window.storage){
      const ok = await window.storage.set(STORAGE_KEY, json, false);
      if(ok) return;
    }
  }catch(e){ /* fall through */ }
  try{ localStorage.setItem(STORAGE_KEY, json); }catch(e){ /* memory only */ }
}

function taskKey(day, idx){ return "d" + day + "_t" + idx; }

function render(){
  const container = document.getElementById('days');
  container.innerHTML = '';
  let totalTasks = 0, totalDone = 0;

  PLAN.forEach(dayObj => {
    const doneCount = dayObj.tasks.filter((t,i) => state[taskKey(dayObj.day,i)]).length;
    const total = dayObj.tasks.length;
    totalTasks += total;
    totalDone += doneCount;
    const isComplete = doneCount === total;

    const card = document.createElement('div');
    card.className = 'day-card' + (isComplete ? ' complete' : '');

    card.innerHTML = `
      <div class="day-head">
        <div class="day-head-left">
          <span class="day-num">Day ${dayObj.day}</span>
          <span class="day-date">${dayObj.date}</span>
        </div>
        <span class="day-progress-pill">${doneCount}/${total} done</span>
      </div>
      <div class="mini-bar"><div class="mini-bar-fill" style="width:${(doneCount/total)*100}%"></div></div>
      <div class="task-list"></div>
      <button class="complete-btn">${isComplete ? 'Sab Task Complete ✓' : 'Task Completed'}</button>
    `;

    const taskListEl = card.querySelector('.task-list');
    dayObj.tasks.forEach((t, i) => {
      const key = taskKey(dayObj.day, i);
      const checked = !!state[key];
      const row = document.createElement('div');
      row.className = 'task-row' + (checked ? ' checked' : '');
      row.innerHTML = `
        <div class="task-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="task-body">
          <span class="task-subject">${t.subject}</span>
          <span class="task-text">${t.text}</span>
        </div>
      `;
      row.addEventListener('click', () => toggleTask(dayObj.day, i));
      taskListEl.appendChild(row);
    });

    const btn = card.querySelector('.complete-btn');
    btn.addEventListener('click', () => {
      const allChecked = dayObj.tasks.every((t,i) => state[taskKey(dayObj.day,i)]);
      dayObj.tasks.forEach((t,i) => { state[taskKey(dayObj.day,i)] = !allChecked; });
      saveState();
      render();
    });

    container.appendChild(card);
  });

  const pct = totalTasks ? Math.round((totalDone/totalTasks)*100) : 0;
  const circumference = 201;
  const offset = circumference - (pct/100)*circumference;
  document.getElementById('overallRing').style.strokeDashoffset = offset;
  document.getElementById('overallPercent').textContent = pct + '%';
  document.getElementById('overallSub').textContent = `${totalDone} / ${totalTasks} tasks complete — Mumma, tick karte jayein jaise jaise ho jaye.`;
}

function toggleTask(day, idx){
  const key = taskKey(day, idx);
  state[key] = !state[key];
  saveState();
  render();
}

loadState().then(render);
</script>
</body>
</html>
